<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Einsflix</title>

<link rel="icon" href="./pic.jpg">
<script src="https://www.youtube.com/iframe_api"></script>

<style>

:root {
  --bg: #141413;
  --text: #9B978E;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* LOGIN */
#loginView {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 260px;
  margin: 150px auto;
  text-align: center;
}

#loginView input {
  padding: 10px;
  border: none;
  border-radius: 8px;
}

#loginView button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

/* APP */
#appView {
  display: none;
}

.container {
  padding: 20px;
}

.row {
  margin-bottom: 30px;
}

.row-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.row-scroll::-webkit-scrollbar {
  display: none;
}

/* VIDEO */
.video {
  min-width: 200px;
  background: #2a2926;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}

.video img {
  width: 100%;
}

.video span {
  display: block;
  padding: 6px;
  font-size: 12px;
}

/* PROGRESS */
.mini-progress {
  position: absolute;
  top: 0;
  left: 0;
  height: 4px;
  width: 0%;
  background: linear-gradient(90deg, red, #ff4444);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  z-index: 9998;
}

/* PLAYER */
.preview {
  position: fixed;
  display: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 800px;
  height: 450px;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  z-index: 9999;
}

#player {
  width: 100%;
  height: 100%;
  pointer-events: auto;
}

/* TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 15px 20px;
  margin-top: 10px;
}

.logo {
  position: absolute;
  left: 20px;
}

.logo img {
  width: 60px;
  height: 60px;
  object-fit: contain;
}

#welcome {
  text-align: center;
}

.logout {
  position: absolute;
  right: 20px;
  cursor: pointer;
  background: #333;
  padding: 6px 10px;
  border-radius: 6px;
}

.pw-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.pw-wrapper input {
  width: 100%;
  padding-right: 40px;
}

.eye {
  position: absolute;
  right: 10px;
  cursor: pointer;
  user-select: none;
  font-size: 18px;
  opacity: 0.7;
}

.eye:hover {
  opacity: 1;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginView">
  <h2>Einsflix Login</h2>

  <form id="loginForm">
    <input name="username" id="username" placeholder="Username" autocomplete="username">

    <div class="pw-wrapper">
      <input name="password" id="password" type="password" placeholder="Passwort" autocomplete="current-password">
      <span class="eye" onclick="togglePassword()">👁️</span>
    </div>

    <button type="submit">Login</button>
  </form>
</div>

<!-- APP -->
<div id="appView">

  <div class="topbar">
    <div class="logo" onclick="location.reload()">
      <img src="./pic.jpg">
    </div>

    <div id="welcome"></div>

    <div class="logout" onclick="logout()">Logout</div>
  </div>

  <div class="container">

    <div class="row">
      <h2>Kürzlich geschaut</h2>
      <div class="row-scroll" id="continue-videos"></div>
    </div>

    <div class="row">
      <h2>Eintracht Spandau</h2>
      <div class="row-scroll" id="spandau-videos"></div>
    </div>

    <div class="row">
      <h2>LoL</h2>
      <div class="row-scroll" id="lol-videos"></div>
    </div>

    <div class="row">
      <h2>Fußball</h2>
      <div class="row-scroll" id="fussball-videos"></div>
    </div>

    <div class="row">
      <h2>Mediathek</h2>
      <div class="row-scroll" id="media-videos"></div>
    </div>

  </div>
</div>

<!-- OVERLAY + PLAYER -->
<div id="overlay" class="overlay"></div>

<div class="preview" id="playerView">
  <div id="player"></div>
</div>

<script>

/* ================= LOGIN ================= */

const PASSWORD = "EinsAufDieEins";

document.getElementById("loginForm").addEventListener("submit", function (e) {
  e.preventDefault();
  login();
});

function login() {

  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value.trim();

  if (pass !== PASSWORD) {
    alert("Falsches Passwort");
    return;
  }

  localStorage.setItem("user", user);
  localStorage.setItem("loggedIn", "true");

  startApp();
}

function togglePassword() {
  const input = document.getElementById("password");

  input.type = (input.type === "password")
    ? "text"
    : "password";
}

function logout() {
  localStorage.clear();
  location.reload();
}

function isLoggedIn() {
  return localStorage.getItem("loggedIn") === "true";
}

/* ================= APP ================= */

function startApp() {

  document.getElementById("loginView").style.display = "none";
  document.getElementById("appView").style.display = "block";

  document.getElementById("welcome").innerText =
    "Willkommen " + localStorage.getItem("user");

  loadAll();
}

window.onload = () => {
  if (isLoggedIn()) startApp();
};

/* ================= PROGRESS STORAGE ================= */

function saveProgress(id, time, duration) {
  localStorage.setItem("vid_" + id, JSON.stringify({
    time,
    duration,
    ts: Date.now()
  }));
}

function getProgress(id) {
  const data = localStorage.getItem("vid_" + id);
  if (!data) return null;

  const parsed = JSON.parse(data);

  // 30 Tage Cleanup
  if (Date.now() - (parsed.ts || 0) > 30 * 24 * 60 * 60 * 1000) {
    localStorage.removeItem("vid_" + id);
    return null;
  }

  return parsed;
}

/* ================= PLAYER ================= */

let player;
let currentVideo = null;
let progressInterval = null;
let playerReady = false; 

function getVideoId(url) {
  if (!url) return null;

  if (url.includes("shorts/")) {
    return url.split("shorts/")[1].split("?")[0];
  }

  if (url.includes("youtu.be/")) {
    return url.split("youtu.be/")[1].split("?")[0];
  }

  if (url.includes("v=")) {
    return url.split("v=")[1].split("&")[0];
  }

  return null;
}

/* CARD */
function createVideo(item) {

  const id = getVideoId(item.link);
  if (!id) return document.createElement("div");

  const div = document.createElement("div");
  div.className = "video";
  div.setAttribute("data-id", id);

  div.innerHTML = `
    <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
    <span>${item.title}</span>
    <div class="mini-progress"></div>
  `;

  // 🔥 RESTORE PROGRESS ON LOAD
  const saved = getProgress(id);

  if (saved && saved.duration > 0) {
    const percent = (saved.time / saved.duration) * 100;

    setTimeout(() => {
      const bar = div.querySelector(".mini-progress");
      if (bar) bar.style.width = percent + "%";
    }, 0);
  }

  div.onclick = () => openPlayer(id);

  return div;
}

/* LOAD */
async function loadColumn(channelId, containerId) {

  const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;

  const res = await fetch(
    "https://api.rss2json.com/v1/api.json?rss_url=" +
    encodeURIComponent(url)
  );

  const data = await res.json();

  const box = document.getElementById(containerId);
  box.innerHTML = "";

  data.items?.forEach(v => box.appendChild(createVideo(v)));
}

function loadAll() {
  loadColumn("UC5QM2OXKyZaNw13iLbuEpCg", "spandau-videos");
  loadColumn("UCeM9ckIXeJFvdt4bKpXvTqw", "lol-videos");
  loadColumn("UCMQkXTIDVvVDh0ZuVB_0APg", "fussball-videos");
  loadColumn("UCeuKtCc2Q0ySUxYX8yRZhcg", "media-videos");
  saveCurrent();
  renderContinueWatching(); 
}

/* OPEN */
function openPlayer(id) {

  currentVideo = id;

  document.getElementById("overlay").style.display = "block";
  document.getElementById("playerView").style.display = "block";

  const saved = getProgress(id);
  const startTime = saved?.time || 0;

  if (!player) {

  player = new YT.Player("player", {
    videoId: id,
    playerVars: { autoplay: 1 },
    events: {
      onReady: (e) => {
        const trySeek = () => {
          if (!player || !player.getDuration()) {
            setTimeout(trySeek, 200);
            return;
          }
      
          if (startTime > 0) {
            player.seekTo(startTime, true);
          }
      
          playerReady = true;
          startProgress();
        };
      
        trySeek();
      },
      onStateChange: onPlayerStateChange
    }
  });

  } else {
    player.loadVideoById(id);
    
    setTimeout(() => {
      const saved = getProgress(id);
      if (saved?.time) {
        player.seekTo(saved.time, true);
      }
      startProgress();
    }, 300);
  }
}

function onPlayerStateChange(e) {

  if (e.data === YT.PlayerState.PAUSED) {
    saveCurrent();
  }

  if (e.data === YT.PlayerState.ENDED) {
    saveCurrent();
    renderContinueWatching();
  }
}

/* PROGRESS */
function startProgress() {

  clearInterval(progressInterval);
  
  progressInterval = setInterval(() => {
  
    if (!player || !currentVideo || !playerReady) return;
  
    const current = player.getCurrentTime();
    const duration = player.getDuration();
  
    if (!duration) return;
  
    saveProgress(currentVideo, current, duration);
  
    const percent = (current / duration) * 100;
  
    const card = document.querySelector(`.video[data-id="${currentVideo}"]`);
    const bar = card?.querySelector(".mini-progress");
  
    if (bar) bar.style.width = percent + "%";
  
  }, 500);
}

  /* PROGRESS Entries */
function getAllProgressEntries() {
  const items = [];

  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);

    if (!key.startsWith("vid_")) continue;

    try {
      const data = JSON.parse(localStorage.getItem(key));
      if (!data) continue;

      const id = key.replace("vid_", "");

      const percent = data.time / data.duration;

      // nur sinnvolle Einträge
      if (percent < 0.1 || percent > 0.98) continue;

      items.push({
        id,
        ...data
      });

    } catch (e) {}
  }

  return items.sort((a, b) => (b.ts || 0) - (a.ts || 0));
}

  
/* renderContinueWatching */
function renderContinueWatching() {

  const box = document.getElementById("continue-videos");
  if (!box) return;

  box.innerHTML = "";

  const items = getAllProgressEntries();

  items.forEach(entry => {

    const div = document.createElement("div");
    div.className = "video";
    div.setAttribute("data-id", entry.id);

    const percent = (entry.time / entry.duration) * 100;

    div.innerHTML = `
      <img src="https://img.youtube.com/vi/${entry.id}/mqdefault.jpg">
      <span>Weiter schauen</span>
      <div class="mini-progress" style="width:${percent}%"></div>
    `;

    div.onclick = () => openPlayer(entry.id);

    box.appendChild(div);
  });
}

/* save Current Progress*/
function saveCurrent() {
  if (!player || !currentVideo) return;

  const current = player.getCurrentTime?.() || 0;
  const duration = player.getDuration?.() || 0;

  if (!duration || current < 1) return;

  saveProgress(currentVideo, current, duration);
}

/* CLOSE */
function closePlayer() {
  saveCurrent();
  playerReady = false;
  
  document.getElementById("overlay").style.display = "none";
  document.getElementById("playerView").style.display = "none";

  if (player) {
    try { player.pauseVideo(); } catch(e) {}
  }

  currentVideo = null;
  clearInterval(progressInterval);
  progressInterval = null;
  renderContinueWatching();
}

/* EVENTS */
document.getElementById("overlay").addEventListener("pointerdown", closePlayer);
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    saveCurrent();
  }
});

window.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closePlayer();
});

</script>

</body>
</html>
