<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>YouTube Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* 🧱 GRID */
.grid {
  display: grid;
  grid-template-columns: 140px repeat(4, 1fr);
  grid-template-rows: 80px repeat(2, 1fr);
  height: 100vh;
}

/* 🖼️ LOGO */
.logo {
  grid-column: 1;
  grid-row: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1b1b1b;
  border-right: 1px solid #333;
}

.logo img {
  max-width: 70px;
  max-height: 70px;
  object-fit: contain;
}

/* 📊 HEADER */
.col-header {
  background: #1b1b1b;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  border-bottom: 1px solid #333;
}

/* 📌 ROW HEADER */
.row-header {
  background: #1b1b1b;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  border-right: 1px solid #333;
}

/* 📦 CELLS */
.cell {
  overflow-y: auto;
  background: #141414;
  padding: 6px;
}

/* 🎬 VIDEO */
.video {
  display: flex;
  gap: 8px;
  background: #222;
  margin: 6px 0;
  padding: 6px;
  border-radius: 8px;
  align-items: center;
  font-size: 12px;
  cursor: pointer;
}

.video img {
  width: 85px;
  border-radius: 6px;
}

.video span {
  color: white;
}

/* scrollbar */
.cell::-webkit-scrollbar {
  width: 5px;
}
.cell::-webkit-scrollbar-thumb {
  background: #333;
}

/* 🔥 MODAL */
.preview {
  position: fixed;
  display: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 800px;
  height: 450px;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  z-index: 99999;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

.preview iframe {
  width: 100%;
  height: 100%;
}

</style>
</head>

<body>

<div class="grid">

  <!-- 🖼️ LOGO -->
  <div class="logo">
    <img src="./assets/logo.png" alt="Logo">
  </div>

  <!-- 📊 KANÄLE (MEDIA GANZ RECHTS) -->
  <div class="col-header">Spandau</div>
  <div class="col-header">LoL</div>
  <div class="col-header">Fußball</div>
  <div class="col-header">Media</div>

  <!-- 🎬 VIDEOS -->
  <div class="row-header">Videos</div>

  <div class="cell" id="spandau-videos"></div>
  <div class="cell" id="lol-videos"></div>
  <div class="cell" id="fussball-videos"></div>
  <div class="cell" id="media-videos"></div>

  <!-- 🔥 SHORTS -->
  <div class="row-header">Shorts</div>

  <div class="cell" id="spandau-shorts"></div>
  <div class="cell" id="lol-shorts"></div>
  <div class="cell" id="fussball-shorts"></div>
  <div class="cell" id="media-shorts"></div>

</div>

<!-- 🔥 MODAL -->
<div class="preview" id="preview"></div>

<script>

const channels = {
  spandau: "UC5QM2OXKyZaNw13iLbuEpCg",
  lol: "UCeM9ckIXeJFvdt4bKpXvTqw",
  fussball: "UCMQkXTIDVvVDh0ZuVB_0APg",
  media: "UCeuKtCc2Q0ySUxYX8yRZhcg"
};

async function getFeed(channelId) {
  const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
  const res = await fetch(
    "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url)
  );
  const data = await res.json();
  return data.items || [];
}

function isShort(item) {
  return item.link.includes("/shorts/");
}

function getVideoId(url) {
  return url.split("v=")[1]?.split("&")[0] || url.split("/shorts/")[1];
}

/* 🎬 VIDEO */
function createVideo(item) {
  const id = getVideoId(item.link);
  const thumb = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;

  const div = document.createElement("div");
  div.className = "video";

  div.innerHTML = `
    <img src="${thumb}">
    <span>${item.title}</span>
  `;

  div.addEventListener("click", () => {
    const preview = document.getElementById("preview");

    preview.style.display = "block";
    preview.innerHTML = `
      <iframe
        src="https://www.youtube.com/embed/${id}?autoplay=1&controls=1"
        frameborder="0"
        allow="autoplay; encrypted-media; fullscreen">
      </iframe>
    `;
  });

  return div;
}

/* 📥 LOAD */
async function loadColumn(prefix, channelId) {
  const items = await getFeed(channelId);

  const videosBox = document.getElementById(prefix + "-videos");
  const shortsBox = document.getElementById(prefix + "-shorts");

  videosBox.innerHTML = "";
  shortsBox.innerHTML = "";

  items.forEach(item => {
    const el = createVideo(item);

    if (isShort(item)) {
      shortsBox.appendChild(el);
    } else {
      videosBox.appendChild(el);
    }
  });
}

/* 🚀 LOAD ALL */
function loadAll() {
  Object.entries(channels).forEach(([key, id]) => {
    loadColumn(key, id);
  });
}

loadAll();

/* 🔄 AUTO REFRESH */
setInterval(loadAll, 5 * 60 * 1000);

/* ❌ CLOSE MODAL: Klick außerhalb */
document.addEventListener("click", (e) => {
  const preview = document.getElementById("preview");

  if (preview.style.display === "block" && !preview.contains(e.target) && !e.target.closest(".video")) {
    preview.style.display = "none";
    preview.innerHTML = "";
  }
});

/* ⌨️ ESC CLOSE */
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    const preview = document.getElementById("preview");
    preview.style.display = "none";
    preview.innerHTML = "";
  }
});

</script>

</body>
</html>
