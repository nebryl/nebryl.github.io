<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Einsflix</title>

<style>

:root {
  --bg: #232321;
  --panel: #141413;
  --panel2: #1f1e1c;
  --text: #9B978E;
  --accent: #B64F46;
  --accent2: #356675;
  --border: #3a3936;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* 📦 CONTAINER */
.container {
  padding: 20px;
}

/* 🖼️ LOGO */
.logo {
  width: 80px;
  margin-bottom: 20px;
  cursor: pointer;
}

.logo img {
  width: 60px;
  height: 60px;
}

/* 🎬 ROWS */
.row {
  margin-bottom: 30px;
}

.row h2 {
  margin: 0 0 10px 0;
  color: var(--text);
}

/* 📺 HORIZONTAL SCROLL */
.row-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 10px;
}

.row-scroll::-webkit-scrollbar {
  display: none;
}

/* 🎬 VIDEO CARD */
.video {
  min-width: 200px;
  background: #2a2926;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s ease;
}

.video:hover {
  transform: scale(1.08);
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}

.video img {
  width: 100%;
  display: block;
}

.video span {
  display: block;
  padding: 6px;
  font-size: 12px;
  color: var(--text);
}

/* 🔥 MODAL */
.preview {
  position: fixed;
  display: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 800px;
  height: 450px;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  z-index: 99999;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

.preview iframe {
  width: 100%;
  height: 100%;
}

/* 🎮 TWITCH BUTTON */
.twitch-btn {
  position: fixed;
  bottom: 15px;
  right: 15px;

  background: #9146FF;
  color: white;
  border: 1px solid var(--border);
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.15s ease;
  z-index: 100000;
}

.twitch-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 12px rgba(145, 70, 255, 0.5);
}

</style>
</head>

<body>

<div class="container">

  <!-- 🖼️ LOGO -->
  <div class="logo" onclick="reloadDashboard()">
    <img src="./pic.jpg" alt="Logo">
  </div>

  <!-- 🎬 SPANDAU -->
  <div class="row">
    <h2>Spandau</h2>
    <div class="row-scroll" id="spandau-videos"></div>
  </div>

  <!-- 🎮 LOL -->
  <div class="row">
    <h2>LoL</h2>
    <div class="row-scroll" id="lol-videos"></div>
  </div>

  <!-- ⚽ FUSSBALL -->
  <div class="row">
    <h2>Fußball</h2>
    <div class="row-scroll" id="fussball-videos"></div>
  </div>

  <!-- 🎥 MEDIA -->
  <div class="row">
    <h2>Media</h2>
    <div class="row-scroll" id="media-videos"></div>
  </div>

</div>

<!-- 🔥 MODAL -->
<div class="preview" id="preview"></div>

<!-- 🎮 TWITCH BUTTON -->
<button class="twitch-btn" onclick="openTwitch()">
  🎮 Spandau Twitch
</button>

<script>

const channels = {
  spandau: "UC5QM2OXKyZaNw13iLbuEpCg",
  lol: "UCeM9ckIXeJFvdt4bKpXvTqw",
  fussball: "UCMQkXTIDVvVDh0ZuVB_0APg",
  media: "UCeuKtCc2Q0ySUxYX8yRZhcg"
};

async function getFeed(channelId) {
  const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
  const res = await fetch(
    "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url)
  );
  const data = await res.json();
  return data.items || [];
}

function getVideoId(url) {
  return url.split("v=")[1]?.split("&")[0] || url.split("/shorts/")[1];
}

/* 🔄 Reload */
function reloadDashboard() {
  loadAll();
}

/* 🎮 TWITCH */
function openTwitch() {
  window.open("https://www.twitch.tv/eintrachtspandau", "_blank");
}

/* 🎬 VIDEO */
function createVideo(item) {
  const id = getVideoId(item.link);
  const thumb = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;

  const div = document.createElement("div");
  div.className = "video";

  div.innerHTML = `
    <img src="${thumb}">
    <span>${item.title}</span>
  `;

  div.addEventListener("click", () => {
    const preview = document.getElementById("preview");

    preview.style.display = "block";
    preview.innerHTML = `
      <iframe
        src="https://www.youtube.com/embed/${id}?autoplay=1&controls=1"
        frameborder="0"
        allow="autoplay; encrypted-media; fullscreen">
      </iframe>
    `;
  });

  return div;
}

/* 📥 LOAD */
async function loadColumn(prefix, channelId) {
  const items = await getFeed(channelId);

  const box = document.getElementById(prefix + "-videos");
  box.innerHTML = "";

  items.forEach(item => {
    box.appendChild(createVideo(item));
  });
}

/* 🚀 LOAD ALL */
function loadAll() {
  Object.entries(channels).forEach(([key, id]) => {
    loadColumn(key, id);
  });
}

loadAll();

/* ❌ CLOSE MODAL */
document.addEventListener("click", (e) => {
  const preview = document.getElementById("preview");

  if (
    preview.style.display === "block" &&
    !preview.contains(e.target) &&
    !e.target.closest(".video")
  ) {
    preview.style.display = "none";
    preview.innerHTML = "";
  }
});

/* ⌨️ ESC */
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    const preview = document.getElementById("preview");
    preview.style.display = "none";
    preview.innerHTML = "";
  }
});

/* 🔄 AUTO REFRESH */
setInterval(loadAll, 5 * 60 * 1000);

</script>

</body>
</html>
