<style>

:root {
  --bg: #141413;
  --text: #9B978E;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* LOGIN */
#loginView {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  height: 100vh;
  width: 100%;

  margin: 0;
  text-align: center;

  background: radial-gradient(circle at top, #1c1b18, #0f0f0e);
}

/* Login Card */
#loginView form {
  width: 320px;
  padding: 25px;

  display: flex;
  flex-direction: column;
  gap: 12px;

  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);

  border-radius: 16px;

  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  box-shadow: 0 10px 40px rgba(0,0,0,0.6);

  animation: popIn 0.4s ease;
}

/* Titel */
#loginView h2 {
  color: #d6d3cc;
  margin-bottom: 20px;
  font-size: 26px;
  letter-spacing: 1px;
}

/* Inputs */
#loginView input {
  padding: 12px;
  border-radius: 10px;

  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.3);

  color: #ddd;
  outline: none;

  transition: 0.2s;
}

#loginView input:focus {
  border-color: #316A7D;
  box-shadow: 0 0 10px rgba(49,106,125,0.4);
}

/* Button */
#loginView button {
  padding: 12px;
  border-radius: 10px;

  border: none;
  cursor: pointer;

  font-weight: bold;

  background: linear-gradient(135deg, #B74F46, #316A7D);
  color: white;

  transition: 0.2s;
}

#loginView button:hover {
  transform: scale(1.03);
  filter: brightness(1.1);
}

/* Animation */
@keyframes popIn {
  from {
    transform: translateY(20px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* APP */
#appView {
  display: none;
}

.container {
  padding: 20px;
}

.row {
  margin-bottom: 30px;
}

.row-scroll {
  display: flex;
  gap: 10px;

  overflow-x: auto;
  overflow-y: hidden;

  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  padding: 10px;

  border-radius: 12px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);

  border: 1px solid rgba(255, 255, 255, 0.05);
}

.row-scroll::-webkit-scrollbar {
  display: none;
}

/* VIDEO */
.video {
  min-width: 280px;
  max-width: 280px;
  aspect-ratio: 16/9;
  background: #2a2926;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  will-change: transform;
  scroll-snap-align: start;
}

.video img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.video span {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;

  padding: 10px;

  font-size: 12px;
  font-weight: 600;

  color: white;

  background: linear-gradient(
    to top,
    rgba(0,0,0,0.75),
    rgba(0,0,0,0.2),
    transparent
  );

  backdrop-filter: blur(2px);

  z-index: 2;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.video:hover {
  transform: scale(1.05);
  z-index: 20;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* PROGRESS */
.mini-progress {
  position: absolute;
  top: 0;
  left: 0;
  height: 4px;
  width: 0%;
  background: linear-gradient(90deg, red, #ff4444);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  z-index: 9998;
}

/* PLAYER */
.preview {
  position: fixed;
  display: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 800px;
  height: 450px;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  z-index: 9999;
}

#player {
  width: 100%;
  height: 100%;
  pointer-events: auto;
}

/* TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 20px;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}

.logo img {
  width: 60px;
  height: 60px;
  object-fit: contain;
  display: block;
}

.title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 1.5px;
  position: relative;
  z-index: 1;
  color: #d6d3cc;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

/* kompakter, dunkler Spotlight-Hintergrund */
.title::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 300%;
  height: 130%;

  background: radial-gradient(
    circle,
    rgba(0, 0, 0, 0.85) 0%,
    rgba(0, 0, 0, 0.55) 35%,
    rgba(0, 0, 0, 0.15) 60%,
    rgba(0, 0, 0, 0) 80%
  );

  filter: blur(4px);
  z-index: -1;
  pointer-events: none;
}

.eins {
  color: #B74F46;
}

.flix {
  color: #316A7D;
}

.right-side {
  display: flex;
  align-items: center;
  gap: 10px;
}

#welcome {
  margin: 0;
}

.logout {
  cursor: pointer;
  background: #333;
  padding: 6px 10px;
  border-radius: 6px;
}

.pw-wrapper {
  position: relative;

  align-items: center;
}

.pw-wrapper input {
  width: 100%;

}

.eye {

.eye:hover {

.video.short {

#continue-videos .video {

#continue-videos .video.short {

.badge-new {

.impressum {

.impressum:hover {

/* HERO SECTION */
.hero-section {
  width: 100vw;
  margin-left: calc(-50vw + 50%);

  position: relative;
  z-index: 1;

  padding: 0;
  margin-top: 0;
  margin-bottom: 0;

}

@media (max-width: 768px) {

.hero-banner {
  width: 100%;
  height: 100%;
  background: #2a2926;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  z-index: 2;

  /* Weiche Maske für sanftes Ausfaden */
  -webkit-mask-image: linear-gradient(
    to bottom,
    rgba(0,0,0,1) 65%,
    rgba(0,0,0,0.6) 75%,
    rgba(0,0,0,0.2) 85%,
    rgba(0,0,0,0) 100%
  );

  mask-image: linear-gradient(
    to bottom,
    rgba(0,0,0,1) 65%,
    rgba(0,0,0,0.6) 75%,
    rgba(0,0,0,0.2) 85%,
    rgba(0,0,0,0) 100%
  );

  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;

  -webkit-mask-size: 100% 100%;

}

.hero-banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
  display: block;
}

/* Nur sanftes Ausfaden am unteren Rand */
.hero-banner::after {
  display: none;
}

.hero-info {
  position: absolute;
  top: 70%;
  right: 60px;
  z-index: 4;
  max-width: 500px;
  text-align: right;
}

.hero-info h1 {

  font-weight: 600;

  color: #fff;

  text-shadow: 0 4px 20px rgba(0,0,0,0.9);
}

/* NEW VIDEOS - LARGE */
.video.large {

#new-videos .video.large.short {

#new-videos-row {

.video-hover {

.hover-preview iframe {

.video-meta {

}

.video-meta h3 {

.video-meta p {

.cola {

.cola-icon {

.profile-card {

}

.profile-card:hover {

}

.avatar {

.einsonly {

.name {

}

.nav-btn {

  padding: 6px 10px;

  cursor: pointer;

.nav-btn:hover {

}

.nav-btn.active {
  background: linear-gradient(135deg, #B74F46, #316A7D);

}

.page {
  display: none;
  opacity: 0;
}

.page.active {
  display: block;

.page.show {

.card {
  background: rgba(255,255,255,0.03);

#playerView {

#playerArea {

#colaZone {

  overflow: hidden;
}

#colaCounter {

#profileView {

.fussballde_widget {

.table-card {

    transform: translateY(-100px);
    opacity: 0;

  10% {

  100% {

    opacity: 0;

</style>
</head>

<div id="loginView">

      <input name="password" id="password" type="password" placeholder="Passwort" autocomplete="current-password">

<script>

/* ================= LOGIN ================= */

const PASSWORD = "EinsAufDieEins";

let colaCount = Number(localStorage.getItem("colaCount") || 0);

const CHANNELS_EinsOnly = [
  {
    title: "Eintracht Spandau",
    id: "spandau-videos",
    channelId: "UC5QM2OXKyZaNw13iLbuEpCg"
  },
  {
    title: "Eintracht Spandau League of Legends",
    id: "lol-videos",
    channelId: "UCeM9ckIXeJFvdt4bKpXvTqw"
  },
  {
    title: "Eintracht Spandau Fußball",
    id: "fussball-videos",
    channelId: "UCMQkXTIDVvVDh0ZuVB_0APg"
  },
  {
    title: "Eintracht Spandau Mediathek",
    id: "media-videos",
    channelId: "UCeuKtCc2Q0ySUxYX8yRZhcg"
  }
];

const CHANNELS_EinsPlus = [
  {
    title: "Eintracht Spandau",
    id: "spandau-videos",
    channelId: "UC5QM2OXKyZaNw13iLbuEpCg"
  },
  {
    title: "Eintracht Spandau League of Legends",
    id: "lol-videos",
    channelId: "UCeM9ckIXeJFvdt4bKpXvTqw"
  },
  {
    title: "Eintracht Spandau Fußball",
    id: "fussball-videos",
    channelId: "UCMQkXTIDVvVDh0ZuVB_0APg"
  },
  {
    title: "Eintracht Spandau Mediathek",
    id: "media-videos",
    channelId: "UCeuKtCc2Q0ySUxYX8yRZhcg"
  },
  {
    title: "PowerOfEvil",
    id: "powerofevil-videos",
    channelId: "UCD777FoaysRYNiIxL79Nmlg"
  },
  {
    title: "Broeki",
    id: "broeki-videos",
    channelId: "UCMDbIWqBUH10L3XMlWyiEtQ"
  }
];

let ACTIVE_CHANNELS = [];
let currentUser = null;

document.getElementById("loginForm").addEventListener("submit", function (e) {
  e.preventDefault();
  login();
});

function login() {

  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value.trim();

  if (pass !== PASSWORD) {
    alert("Falsches Passwort");
    return;
  }

  localStorage.setItem("username", user);
  localStorage.setItem("loggedIn", "true");

  // 🔥 statt direkt App → Profile anzeigen
  document.getElementById("loginView").style.display = "none";
  document.getElementById("profileView").style.display = "block";
}

function togglePassword() {
  const input = document.getElementById("password");

  input.type = (input.type === "password")
    ? "text"
    : "password";
}

function logout() {
  localStorage.clear();
  location.reload();
}

function isLoggedIn() {
  return localStorage.getItem("loggedIn") === "true";
}

function selectProfile(user) {

  currentProfile = user;

  // 🔥 Channel-Logik
  if (user === "EinsOnly") {
    ACTIVE_CHANNELS = CHANNELS_EinsOnly;
  } else if (user === "EinsPlus") {
    ACTIVE_CHANNELS = CHANNELS_EinsPlus;
  } else {
    ACTIVE_CHANNELS = [];
  }

  localStorage.setItem("user", user);

  document.getElementById("profileView").style.display = "none";

  startApp();
}

function showPage(page, e) {
  if (e) e.stopPropagation();

  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.page === page);
  });

  const pages = {
    einsflix: document.getElementById("einsflixView"),
    football: document.getElementById("footballView")
  };

  Object.values(pages).forEach(p => {
    p.classList.remove("show");
    p.classList.remove("active");
  });

  const target = pages[page];
  if (!target) return;

  target.classList.add("active");

  // 🔥 wichtig: 1 Frame warten
  requestAnimationFrame(() => {
    target.classList.add("show");
  });

  if (page === "football") {
  setTimeout(() => {
    window.dispatchEvent(new Event("resize"));
  }, 200);
}
}

/* ================= APP ================= */

function startApp() {

  updateColaUI();

  document.getElementById("playerView").style.display = "none";
  document.getElementById("overlay").style.display = "none";
  document.getElementById("video-meta").style.display = "none";

  document.getElementById("loginView").style.display = "none";
  document.getElementById("appView").style.display = "block";

  showPage("einsflix");
  document.getElementById("einsflixView").classList.add("show");
  
  const username = localStorage.getItem("username") || "User";

  document.getElementById("welcome").innerText =
    "Willkommen " + username;

  allNewVideos = [];

  createRows();
  loadAll();
  renderContinueWatching();

  requestAnimationFrame(() => {
    showPage("einsflix");
  });
}

window.onload = () => {
  try {

    // Wenn nicht eingeloggt → Login zeigen
    if (!isLoggedIn()) {
      document.getElementById("loginView").style.display = "flex";
      return;
    }

    // Wenn eingeloggt → Profile (Presets) zeigen
    document.getElementById("loginView").style.display = "none";
    document.getElementById("profileView").style.display = "block";

  } catch (e) {
    console.error(e);
  }
};

function createRows() {
  const container = document.getElementById("dynamic-rows");
  container.innerHTML = "";

  ACTIVE_CHANNELS.forEach(ch => {
    const row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `
      <h2>${ch.title}</h2>
      <div class="row-scroll" id="${ch.id}"></div>
    `;

    container.appendChild(row);
  });
}

/* ================= PROGRESS STORAGE ================= */

function saveProgress(id, time, duration, title, isShort = false) {
  localStorage.setItem(getProfileKey(id), JSON.stringify({
    time,
    duration,
    title,
    isShort,
    ts: Date.now()
  }));
}

function getProgress(id) {
  const data = localStorage.getItem(getProfileKey(id));
  if (!data) return null;

  const parsed = JSON.parse(data);

  if (Date.now() - (parsed.ts || 0) > 30 * 24 * 60 * 60 * 1000) {
    localStorage.removeItem(getProfileKey(id));
    return null;
  }

  return parsed;
}

/* ================= PLAYER ================= */

let player;
let currentVideo = null;
let progressInterval = null;
let allNewVideos = [];

function getVideoId(url) {
  if (!url) return null;

  if (url.includes("shorts/")) {
    return url.split("shorts/")[1].split("?")[0];
  }

  if (url.includes("youtu.be/")) {
    return url.split("youtu.be/")[1].split("?")[0];
  }

  if (url.includes("v=")) {
    return url.split("v=")[1].split("&")[0];
  }

  return null;
}

/* isShort */
function isShort(url) {
  return url.includes("shorts/");
}

  /* isNewVideo */
function isNewVideo(item) {
  const published = Date.parse(item.pubDate);
  if (!published) return false; // fallback
  const hours = (Date.now() - published) / (1000 * 60 * 60);
  return hours <= 48;
}

/* CARD */
function createVideo(item) {

  const id = getVideoId(item.link);
  if (!id) return document.createElement("div");

  const isShortVideo = isShort(item.link);
  const isNew = isNewVideo(item);

  const saved = getProgress(id);

  // 🔥 WICHTIG: EINDEUTIGE ID
  const uniqueId = `hover-${id}-${Math.random().toString(36).substr(2,5)}`;

  const div = document.createElement("div");
  div.className = "video" + (isShortVideo ? " short" : "");
  div.setAttribute("data-id", id);

  div.dataset.title = item.title;
  div.dataset.date = item.pubDate;

  div.innerHTML = `
    <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
    <span>${item.title}</span>
    <div class="mini-progress"></div>

    <!-- 🔥 FIX IST HIER -->
    <div class="video-hover" id="${uniqueId}"></div>

    ${isNew ? '<div class="badge-new">NEU</div>' : ''}
  `;

  // Progress-Bar wiederherstellen
  if (saved && saved.duration > 0) {
    const percent = (saved.time / saved.duration) * 100;

    setTimeout(() => {
      const bar = div.querySelector(".mini-progress");
      if (bar) bar.style.width = percent + "%";
    }, 0);
  }

  div.onclick = () => openPlayer(id);

  setTimeout(() => {
    attachHoverPopup(div, id);
  }, 0);

  return div;
}

/* LOAD */
async function loadColumn(channelId, containerId) {

  const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;

  try {

    const res = await fetch("https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url));

    if (!res.ok) {
      throw new Error("HTTP Fehler: " + res.status);
    }

    const text = await res.text();

    if (!text.includes("<feed")) {
      console.error("Kein XML:", text.slice(0, 200));
      return;
    }

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    const entries = [...xml.querySelectorAll("entry")];

    const box = document.getElementById(containerId);
    if (!box) return;

    box.innerHTML = "";

    entries.forEach(entry => {

      const item = {
        title: entry.querySelector("title")?.textContent,
        link: entry.querySelector("link")?.getAttribute("href"),
        pubDate: entry.querySelector("published")?.textContent
      };

      const card = createVideo(item);
      box.appendChild(card);

      if (isNewVideo(item)) {
        allNewVideos.push(item);
      }
    });

  } catch (err) {
    console.error("Feed Fehler:", err);
  }
}

function loadAll() {

  // 🔥 1. Loader zuerst anzeigen
  document.getElementById("new-videos").innerHTML =
    "<div style='padding:20px'>Lade Inhalte...</div>";

  const promises = ACTIVE_CHANNELS.map(ch =>
    loadColumn(ch.channelId, ch.id)
  );

  Promise.all(promises).then(() => {

    allNewVideos.sort((a, b) =>
      Date.parse(b.pubDate) - Date.parse(a.pubDate)
    );

    renderNewVideos();
  });
}

  /* onYouTubeIframeAPIReady */
function onYouTubeIframeAPIReady() {
  console.log("YouTube API ready");
}

/* OPEN */
function openPlayer(id) {

  currentVideo = id;

  document.getElementById("overlay").style.display = "block";
  document.getElementById("playerView").style.display = "block";

  const metaBox = document.getElementById("video-meta");
  const metaTitle = document.getElementById("meta-title");
  const metaDate = document.getElementById("meta-date");

  const card = document.querySelector(`.video[data-id="${id}"]`);

  if (card) {
    metaTitle.innerText = card.dataset.title || "Unbekannt";

    let dateText = "Unbekannt";

    if (card?.dataset?.date) {
      const d = new Date(card.dataset.date);

      dateText = d.toLocaleDateString("de-DE") + " " +
                d.toLocaleTimeString("de-DE", {
                  hour: "2-digit",
                  minute: "2-digit"
                }) + " Uhr";
    }

    metaDate.innerText = "Veröffentlicht: " + dateText;

    metaBox.style.display = "block";
  }

  const saved = getProgress(id);
  const startTime = saved?.time || 0;

  if (!player) {

  player = new YT.Player("player", {
    videoId: id,
    playerVars: { autoplay: 1 },
    events: {
      onReady: () => {
      
        const waitForVideo = () => {
      
          const duration = player.getDuration?.();
      
          if (!duration || duration === 0) {
            setTimeout(waitForVideo, 200);
            return;
          }
      
          if (startTime > 1) {
            player.seekTo(startTime, true);
          }
          saveCurrent();
        };
      
        // kleine Startverzögerung für YouTube intern
        setTimeout(waitForVideo, 300);
      },
      onStateChange: onPlayerStateChange
    }
  });

  } else {
    player.loadVideoById(id);
    
    setTimeout(() => {
    
      const saved = getProgress(id);
      const time = saved?.time || 0;
    
      const waitSeek = () => {
    
        const duration = player.getDuration?.();
    
        if (!duration || duration === 0) {
          setTimeout(waitSeek, 200);
          return;
        }
    
        if (time > 1) {
          player.seekTo(time, true);
        }

        startProgress();
      };
    
      waitSeek();
    
    }, 300);
  }
}

function onPlayerStateChange(e) {

  if (e.data === YT.PlayerState.PLAYING) {
    startProgress();
    saveCurrent();
    colaStart();
  }
  
  if (e.data === YT.PlayerState.PAUSED) {
    saveCurrent();
    clearInterval(colaInterval);
  }

  if (e.data === YT.PlayerState.ENDED) {
    saveCurrent();
    renderContinueWatching();
  }
}

/* PROGRESS */
function startProgress() {

  clearInterval(progressInterval);
  
  progressInterval = setInterval(() => {
  
    if (!player || !currentVideo) return;
  
    const current = player.getCurrentTime();
    const duration = player.getDuration();
  
    if (!duration) return;
   
    const title = document.querySelector(`.video[data-id="${currentVideo}"] span`)?.innerText || "";
    const videoElement = document.querySelector(`.video[data-id="${currentVideo}"]`);
    const isShortVideo = videoElement?.classList.contains("short") || false;
    saveProgress(currentVideo, current, duration, title, isShortVideo);
  
    const percent = (current / duration) * 100;
  
    const cards = document.querySelectorAll(`.video[data-id="${currentVideo}"]`);
    
    cards.forEach(card => {
      const bar = card.querySelector(".mini-progress");
      if (bar) bar.style.width = percent + "%";
    });
  
  }, 500);
}

  /* PROGRESS Entries */
function getAllProgressEntries() {
  const items = [];
  const profile = localStorage.getItem("user") || "default";
  const prefix = `vid_${profile}_`;

  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);

    if (!key.startsWith(prefix)) continue;

    try {
      const data = JSON.parse(localStorage.getItem(key));
      if (!data || !data.time || !data.duration) continue;

      const id = key.replace(prefix, "");

      const percent = data.time / data.duration;

      if (!isFinite(percent)) continue;
      if (percent < 0.1) continue;
      if (percent >= 0.98) continue;
      if (data.time < 10) continue;

      items.push({
        id,
        ...data
      });

    } catch (e) {
      console.warn("Bad entry:", key);
    }
  }

  return items.sort((a, b) => (b.ts || 0) - (a.ts || 0));
}

  
/* renderContinueWatching */
function renderContinueWatching() {

  const box = document.getElementById("continue-videos");
  const row = document.getElementById("continue-row");
  const title = document.getElementById("continue-title");

  if (!box || !row || !title) return;

  box.innerHTML = "";

  const items = getAllProgressEntries();

  if (!items.length) {
    row.style.display = "none";
    title.style.display = "none";
    return;
  }
  
  row.style.display = "block";
  title.style.display = "block";

  items.forEach(entry => {

    const div = document.createElement("div");
    div.className = "video" + (entry.isShort ? " short" : "");
    div.setAttribute("data-id", entry.id);

    const percent = (entry.time / entry.duration) * 100;

    div.innerHTML = `
      <img src="https://img.youtube.com/vi/${entry.id}/hqdefault.jpg">
      <span>${entry.title || "Weiter schauen"}</span>
      <div class="mini-progress" style="width:${percent}%"></div>
    `;

    div.onclick = () => openPlayer(entry.id);

    box.appendChild(div);
    
    setTimeout(() => {
      attachHoverPopup(div, entry.id);
    }, 0);
  });
}

/* renderNewVideos */
function renderNewVideos() {
  const heroBox = document.getElementById("hero-banner");
  const box = document.getElementById("new-videos");
  const row = document.getElementById("new-videos-row");

  if (!allNewVideos.length) {
    row.style.display = "none";
    document.getElementById("new-videos-title").style.display = "none";
  } else {
    row.style.display = "block";
    document.getElementById("new-videos-title").style.display = "block";
  }

  let heroItem = null;

  /* =========================
     1. PRIORITÄT: NEW VIDEOS
  ========================== */
  if (allNewVideos.length > 0) {
    heroItem = allNewVideos[0];
  }

  /* =========================
     2. FALLBACK: 1. CHANNEL
  ========================== */
  if (!heroItem) {

    const firstChannel = ACTIVE_CHANNELS[0];

    if (firstChannel) {

      const container = document.getElementById(firstChannel.id);

      if (container) {

        const firstCard = container.querySelector(".video");

        if (firstCard) {

          const img = firstCard.querySelector("img")?.src;
          const title = firstCard.querySelector("span")?.innerText || "Video";

          const match = img?.match(/vi\/(.+?)\//);

          if (match?.[1]) {
            heroItem = {
              link: "https://youtube.com/watch?v=" + match[1],
              title
            };
          }
        }
      }
    }
  }

  /* =========================
     3. ABSOLUTER FALLBACK
  ========================== */
  if (!heroItem) {
    heroBox.innerHTML = `<div style="color:white;padding:20px;">Kein Video verfügbar</div>`;
    return;
  }

  const heroId = getVideoId(heroItem.link);

  if (heroId) {
    heroBox.innerHTML = `
      <img src="https://img.youtube.com/vi/${heroId}/maxresdefault.jpg"
        onerror="this.src='https://img.youtube.com/vi/${heroId}/hqdefault.jpg'">

      <div class="hero-info">
        <h1>${heroItem.title}</h1>
      </div>
    `;

    heroBox.onclick = () => openPlayer(heroId);
  }

  /* =========================
     NEW VIDEO CARDS
  ========================== */
  allNewVideos.forEach(item => {
    const card = createVideo(item);
    card.classList.add("large");
    box.appendChild(card);
  });
}

/* save Current Progress*/
function saveCurrent() {
  if (!player || !currentVideo || typeof player.getCurrentTime !== "function") return;
  
  const current = player.getCurrentTime?.() || 0;
  const duration = player.getDuration?.() || 0;

  if (!duration || current < 1) return;

  if (current >= duration - 2) {
    localStorage.removeItem("vid_" + currentVideo);
    return;
  }
  
  const title = document.querySelector(`.video[data-id="${currentVideo}"] span`)?.innerText || "";
  const videoElement = document.querySelector(`.video[data-id="${currentVideo}"]`);
  const isShortVideo = videoElement?.classList.contains("short") || false;
  saveProgress(currentVideo, current, duration, title, isShortVideo);
}

/* CLOSE */
function closePlayer() {
  saveCurrent();  
  document.getElementById("overlay").style.display = "none";
  document.getElementById("playerView").style.display = "none";

  if (player) {
    try { player.pauseVideo(); } catch(e) {}
  }

  document.getElementById("video-meta").style.display = "none";

  currentVideo = null;
  clearInterval(progressInterval);
  progressInterval = null;
  renderContinueWatching();
  clearInterval(colaInterval);

  if (player) {
  try {
    player.stopVideo();
    player.clearVideo();
  } catch(e) {}
}
}

let hoverPlayer = null;


function attachHoverPopup(card, videoId) {

  const container = card.querySelector(".video-hover");
  let hoverPlayer = null;

  function createPlayer() {
    if (!window.YT || !YT.Player) {
      console.warn("YT API not ready yet");
      return;
    }

    hoverPlayer = new YT.Player(container.id, {
      videoId: videoId,
      playerVars: {
        autoplay: 1,
        mute: 1,
        controls: 0,
        rel: 0,
        modestbranding: 1
      }
    });
  }

  card.addEventListener("mouseenter", () => {
    container.style.display = "block";

    // sicherstellen dass API da ist
    if (window.YT && YT.Player) {
      createPlayer();
    } else {
      const wait = setInterval(() => {
        if (window.YT && YT.Player) {
          clearInterval(wait);
          createPlayer();
        }
      }, 100);
    }
  });

  function trackPage(path = location.pathname) {
  if (window.goatcounter) {
    window.goatcounter.count({
      path: path,
      title: document.title
    });
  }
}

  card.addEventListener("mouseleave", () => {
    container.style.display = "none";
    container.innerHTML = "";

    if (hoverPlayer) {
      hoverPlayer.destroy();
      hoverPlayer = null;
    }
  });
}

function getProfileKey(id) {
  const profile = localStorage.getItem("user") || "default";
  return `vid_${profile}_${id}`;
}

function updateColaUI() {
  document.getElementById("colaCounter").innerHTML =
    `${colaCount} <img src="./cola.png" class="cola-icon">`;

  localStorage.setItem("colaCount", colaCount);
}

updateColaUI();

function addCola() {
  colaCount++;
  updateColaUI();
}

let colaInterval;

function spawnCola() {

  const rect = document.getElementById("playerView").getBoundingClientRect();

  const side = Math.random() < 0.5 ? "left" : "right";

  let x;

  if (side === "left") {
    x = rect.left - 60;
  } else {
    x = rect.right + 20;
  }

  const y = rect.top + Math.random() * rect.height;

  const cola = document.createElement("div");
  cola.className = "cola";

  cola.style.position = "fixed";
  cola.style.left = x + "px";
  cola.style.top = y + "px";

  cola.style.animationDuration = (8 + Math.random() * 4) + "s";

  cola.onclick = () => {
    addCola();
    cola.remove();
  };

  document.body.appendChild(cola);

  setTimeout(() => cola.remove(), 12000);
}

function colaStart() {

  clearInterval(colaInterval);

  colaInterval = setInterval(() => {
    spawnCola();
  }, 10000 + Math.random() * 10000);
}

/* EVENTS */
document.getElementById("overlay").addEventListener("pointerdown", closePlayer);
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    saveCurrent();
  }
});

window.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closePlayer();
});
