<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <script data-goatcounter="https://nebryl.goatcounter.com/count"
        async src="https://gc.zgo.at/count.js"></script>

<title>Einsflix</title>

<link rel="icon" href="./pic.png">
<script src="https://www.youtube.com/iframe_api"></script>

<style>

:root {
  --bg: #141413;
  --text: #9B978E;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* LOGIN */
#loginView {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 260px;
  margin: 150px auto;
  text-align: center;
}

#loginView input {
  padding: 10px;
  border: none;
  border-radius: 8px;
}

#loginView button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

/* APP */
#appView {
  display: none;
}

.container {
  padding: 20px;
}

.row {
  margin-bottom: 30px;
}

.row-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.row-scroll::-webkit-scrollbar {
  display: none;
}

/* VIDEO */
.video {
  min-width: 280px;
  max-width: 280px;
  aspect-ratio: 16/9;
  background: #2a2926;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}

.video img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.video span {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;

  padding: 10px;

  font-size: 12px;
  font-weight: 600;

  color: white;

  background: linear-gradient(
    to top,
    rgba(0,0,0,0.75),
    rgba(0,0,0,0.2),
    transparent
  );

  backdrop-filter: blur(2px);

  z-index: 2;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* PROGRESS */
.mini-progress {
  position: absolute;
  top: 0;
  left: 0;
  height: 4px;
  width: 0%;
  background: linear-gradient(90deg, red, #ff4444);
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  z-index: 9998;
}

/* PLAYER */
.preview {
  position: fixed;
  display: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 800px;
  height: 450px;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  z-index: 9999;
}

#player {
  width: 100%;
  height: 100%;
  pointer-events: auto;
}

/* TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 20px;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}

.logo img {
  width: 60px;
  height: 60px;
  object-fit: contain;
  display: block;
}

.title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 1.5px;
  position: relative;
  z-index: 1;
  color: #d6d3cc;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}

/* kompakter, dunkler Spotlight-Hintergrund */
.title::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  width: 300%;
  height: 130%;

  background: radial-gradient(
    circle,
    rgba(0, 0, 0, 0.85) 0%,
    rgba(0, 0, 0, 0.55) 35%,
    rgba(0, 0, 0, 0.15) 60%,
    rgba(0, 0, 0, 0) 80%
  );

  filter: blur(4px);
  z-index: -1;
  pointer-events: none;
}

.eins {
  color: #B74F46;
}

.flix {
  color: #316A7D;
}

.right-side {
  display: flex;
  align-items: center;
  gap: 10px;
}

#welcome {
  margin: 0;
}

.logout {
  cursor: pointer;
  background: #333;
  padding: 6px 10px;
  border-radius: 6px;
}

.pw-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.pw-wrapper input {
  width: 100%;
  padding-right: 40px;
}

.eye {
  position: absolute;
  right: 10px;
  cursor: pointer;
  user-select: none;
  font-size: 18px;
  opacity: 0.7;
}

.eye:hover {
  opacity: 1;
}

.video.short {
  min-width: 140px;
  width: 140px;
  aspect-ratio: 16/9;
}

#continue-videos .video {
  min-width: 350px;
  max-width: 350px;
  aspect-ratio: 16/9;
}

#continue-videos .video.short {
  min-width: 175px;
  width: 175px;
}

.video.short span {
  font-size: 11px;
  padding: 4px;
}

.badge-new {
  position: absolute;
  top: 6px;
  right: 6px;
  background: red;
  color: white;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: bold;
}

.impressum {
  color: #9B978E;
  text-decoration: none;

  font-size: 16px; /* gleich wie Standard-Text */
  opacity: 0.8;

  display: flex;
  align-items: center;
}

.impressum:hover {
  opacity: 1;
  text-decoration: underline;
}

/* HERO SECTION */
.hero-section {
  width: 100vw;
  margin-left: calc(-50vw + 50%);
  margin-top: -20px;
  margin-bottom: 0;
  padding: 0;
  position: relative;
  z-index: 1;
}

.hero-banner {
  width: 100%;
  height: 100%;
  background: #2a2926;
  position: relative;
  cursor: pointer;
  overflow: hidden;
  z-index: 2;

  /* Weiche Maske für sanftes Ausfaden */
  -webkit-mask-image: linear-gradient(
    to bottom,
    rgba(0,0,0,1) 65%,
    rgba(0,0,0,0.6) 75%,
    rgba(0,0,0,0.2) 85%,
    rgba(0,0,0,0) 100%
  );

  mask-image: linear-gradient(
    to bottom,
    rgba(0,0,0,1) 65%,
    rgba(0,0,0,0.6) 75%,
    rgba(0,0,0,0.2) 85%,
    rgba(0,0,0,0) 100%
  );

  -webkit-mask-repeat: no-repeat;
  mask-repeat: no-repeat;

  -webkit-mask-size: 100% 100%;
  mask-size: 100% 100%;
}

.hero-banner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
  display: block;
}

/* Nur sanftes Ausfaden am unteren Rand */
.hero-banner::after {
  display: none;
}

.hero-info {
  position: absolute;

  top: 50%;
  right: 60px;

  transform: translateY(-50%);

  z-index: 4;

  max-width: 500px;
  text-align: right;
}

.hero-info h1 {
  margin: 0;

  font-size: 20px;
  font-weight: 600;

  color: #fff;

  line-height: 1.2;

  text-shadow: 0 4px 20px rgba(0,0,0,0.9);
}

/* NEW VIDEOS - LARGE */
.video.large {
  min-width: 420px;
  max-width: 420px;
  aspect-ratio: 16/9;
}

#new-videos .video.large.short {
  min-width: 210px;
  max-width: 210px;
}


#new-videos-row {
  position: relative;
  z-index: 10;
  margin-top: -400px;
}

#continue-row {
  position: relative;
  z-index: 10;
}

.hover-preview {
  position: fixed;
  width: 320px;
  height: 180px;
  background: black;
  border-radius: 10px;
  overflow: hidden;
  pointer-events: none;
  z-index: 99999;
  display: none;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.hover-preview iframe {
  width: 100%;
  height: 100%;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginView">
  <h2>Einsflix Login</h2>

  <form id="loginForm">
    <input name="username" id="username" placeholder="Username" autocomplete="username">

    <div class="pw-wrapper">
      <input name="password" id="password" type="password" placeholder="Passwort" autocomplete="current-password">
      <span class="eye" onclick="togglePassword()">👁️</span>
    </div>

    <button type="submit">Login</button>
  </form>
</div>

<!-- APP -->
<div id="appView">

  <div class="topbar">
    <div class="logo" onclick="location.reload()">
      <img src="./pic.png">
      <a href="https://op.gg/de/lol/summoners/euw/nebryl-EUW" class="impressum" target="_blank">
        Impressum
      </a>
    </div>

    <h2 class="title">
      <span class="eins">Eins</span><span class="flix">flix</span>
    </h2>

    <div class="right-side">
      <span id="welcome">Willkommen <span id="user"></span></span>
      <div class="logout" onclick="logout()">Logout</div>
    </div>
  </div>

  <div class="container">

  <div class="hero-section" id="hero-row">
    <div class="hero-banner" id="hero-banner"></div>
  </div>

  <div class="row" id="new-videos-row">
    <h2 id="new-videos-title">Neue Videos</h2>
    <div class="row-scroll" id="new-videos"></div>
  </div>

  <div class="row" id="continue-row">
    <h2 id="continue-title">Wieder rein da!</h2>
    <div class="row-scroll" id="continue-videos"></div>
  </div>

    <div class="row">
      <h2>Eintracht Spandau</h2>
      <div class="row-scroll" id="spandau-videos"></div>
    </div>

    <div class="row">
      <h2>Eintracht Spandau League of Legends</h2>
      <div class="row-scroll" id="lol-videos"></div>
    </div>

    <div class="row">
      <h2>Eintracht Spandau Fußball</h2>
      <div class="row-scroll" id="fussball-videos"></div>
    </div>

    <div class="row">
      <h2>Eintracht Spandau Mediathek</h2>
      <div class="row-scroll" id="media-videos"></div>
    </div>

  </div>
</div>

<!-- OVERLAY + PLAYER -->
<div id="overlay" class="overlay"></div>

<div class="preview" id="playerView">
  <div id="player"></div>
</div>

<div id="hoverPreview" class="hover-preview"></div>

<script>

/* ================= LOGIN ================= */

const PASSWORD = "EinsAufDieEins";

document.getElementById("loginForm").addEventListener("submit", function (e) {
  e.preventDefault();
  login();
});

function login() {

  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value.trim();

  if (pass !== PASSWORD) {
    alert("Falsches Passwort");
    return;
  }

  localStorage.setItem("user", user);
  localStorage.setItem("loggedIn", "true");

  startApp();
}

function togglePassword() {
  const input = document.getElementById("password");

  input.type = (input.type === "password")
    ? "text"
    : "password";
}

function logout() {
  localStorage.clear();
  location.reload();
}

function isLoggedIn() {
  return localStorage.getItem("loggedIn") === "true";
}

/* ================= APP ================= */

function startApp() {

  document.getElementById("loginView").style.display = "none";
  document.getElementById("appView").style.display = "block";
  
  document.getElementById("welcome").innerText =
    "Willkommen " + localStorage.getItem("user");  

  allNewVideos = [];
  loadAll();
  renderNewVideos();
  renderContinueWatching();
}

window.onload = () => {
  try {
    if (isLoggedIn()) startApp();
  } catch (e) {
    console.error(e);
  }
};



/* ================= PROGRESS STORAGE ================= */

function saveProgress(id, time, duration, title, isShort = false) {
  localStorage.setItem("vid_" + id, JSON.stringify({
    time,
    duration,
    title,
    isShort,
    ts: Date.now()
  }));
}

function getProgress(id) {
  const data = localStorage.getItem("vid_" + id);
  if (!data) return null;

  const parsed = JSON.parse(data);

  // 30 Tage Cleanup
  if (Date.now() - (parsed.ts || 0) > 30 * 24 * 60 * 60 * 1000) {
    localStorage.removeItem("vid_" + id);
    return null;
  }

  return parsed;
}

/* ================= PLAYER ================= */

let player;
let currentVideo = null;
let progressInterval = null;
let allNewVideos = [];

function getVideoId(url) {
  if (!url) return null;

  if (url.includes("shorts/")) {
    return url.split("shorts/")[1].split("?")[0];
  }

  if (url.includes("youtu.be/")) {
    return url.split("youtu.be/")[1].split("?")[0];
  }

  if (url.includes("v=")) {
    return url.split("v=")[1].split("&")[0];
  }

  return null;
}

/* isShort */
function isShort(url) {
  return url.includes("shorts/");
}

  /* isNewVideo */
function isNewVideo(item) {
  const published = Date.parse(item.pubDate);
  if (!published) return false; // fallback
  const hours = (Date.now() - published) / (1000 * 60 * 60);
  return hours <= 48;
}

/* CARD */
function createVideo(item) {

  const id = getVideoId(item.link);
  if (!id) return document.createElement("div");

  const isShortVideo = isShort(item.link);
  const isNew = isNewVideo(item);

  const saved = getProgress(id);

  const div = document.createElement("div");
  div.className = "video" + (isShortVideo ? " short" : "");
  div.setAttribute("data-id", id);

  div.innerHTML = `
    <img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
    <span>${item.title}</span>
    <div class="mini-progress"></div>
    ${isNew ? '<div class="badge-new">NEU</div>' : ''}
  `;

  // Progress-Bar wiederherstellen
  if (saved && saved.duration > 0) {
    const percent = (saved.time / saved.duration) * 100;

    setTimeout(() => {
      const bar = div.querySelector(".mini-progress");
      if (bar) bar.style.width = percent + "%";
    }, 0);
  }

  div.onclick = () => openPlayer(id);

  setTimeout(() => {
    attachHoverPopup(div, id);
  }, 0);  

  return div;
}

/* LOAD */
async function loadColumn(channelId, containerId) {

  const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;

  const res = await fetch(
    "https://api.rss2json.com/v1/api.json?rss_url=" +
    encodeURIComponent(url)
  );

  const data = await res.json();

  const box = document.getElementById(containerId);
  box.innerHTML = "";

  data.items?.forEach(v => {
    const card = createVideo(v);
    box.appendChild(card);
    
    // Sammle neue Videos (jünger als 48h)
    if (isNewVideo(v)) {
      allNewVideos.push(v);
    }
  });
  
  return true;
}

function loadAll() {
  Promise.all([
    loadColumn("UC5QM2OXKyZaNw13iLbuEpCg", "spandau-videos"),
    loadColumn("UCeM9ckIXeJFvdt4bKpXvTqw", "lol-videos"),
    loadColumn("UCMQkXTIDVvVDh0ZuVB_0APg", "fussball-videos"),
    loadColumn("UCeuKtCc2Q0ySUxYX8yRZhcg", "media-videos")
  ]).then(() => {
      // 🔥 SORTIERUNG NACH ALTER
    allNewVideos.sort((a, b) =>
      Date.parse(b.pubDate) - Date.parse(a.pubDate)
    );
    renderNewVideos();
  });
}

  /* onYouTubeIframeAPIReady */
function onYouTubeIframeAPIReady() {
  console.log("YouTube API ready");
}

/* OPEN */
function openPlayer(id) {

  currentVideo = id;

  document.getElementById("overlay").style.display = "block";
  document.getElementById("playerView").style.display = "block";

  const saved = getProgress(id);
  const startTime = saved?.time || 0;

  if (!player) {

  player = new YT.Player("player", {
    videoId: id,
    playerVars: { autoplay: 1 },
    events: {
      onReady: () => {
      
        const waitForVideo = () => {
      
          const duration = player.getDuration?.();
      
          if (!duration || duration === 0) {
            setTimeout(waitForVideo, 200);
            return;
          }
      
          if (startTime > 1) {
            player.seekTo(startTime, true);
          }
          saveCurrent();
        };
      
        // kleine Startverzögerung für YouTube intern
        setTimeout(waitForVideo, 300);
      },
      onStateChange: onPlayerStateChange
    }
  });

  } else {
    player.loadVideoById(id);
    
    setTimeout(() => {
    
      const saved = getProgress(id);
      const time = saved?.time || 0;
    
      const waitSeek = () => {
    
        const duration = player.getDuration?.();
    
        if (!duration || duration === 0) {
          setTimeout(waitSeek, 200);
          return;
        }
    
        if (time > 1) {
          player.seekTo(time, true);
        }

        startProgress();
      };
    
      waitSeek();
    
    }, 300);
  }
}

function onPlayerStateChange(e) {

  if (e.data === YT.PlayerState.PLAYING) {
    startProgress();
    saveCurrent();
  }
  
  if (e.data === YT.PlayerState.PAUSED) {
    saveCurrent();
  }

  if (e.data === YT.PlayerState.ENDED) {
    saveCurrent();
    renderContinueWatching();
  }
}

/* PROGRESS */
function startProgress() {

  clearInterval(progressInterval);
  
  progressInterval = setInterval(() => {
  
    if (!player || !currentVideo) return;
  
    const current = player.getCurrentTime();
    const duration = player.getDuration();
  
    if (!duration) return;
   
    const title = document.querySelector(`.video[data-id="${currentVideo}"] span`)?.innerText || "";
    const videoElement = document.querySelector(`.video[data-id="${currentVideo}"]`);
    const isShortVideo = videoElement?.classList.contains("short") || false;
    saveProgress(currentVideo, current, duration, title, isShortVideo);
  
    const percent = (current / duration) * 100;
  
    const cards = document.querySelectorAll(`.video[data-id="${currentVideo}"]`);
    
    cards.forEach(card => {
      const bar = card.querySelector(".mini-progress");
      if (bar) bar.style.width = percent + "%";
    });
  
  }, 500);
}

  /* PROGRESS Entries */
function getAllProgressEntries() {
  const items = [];

  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);

    if (!key.startsWith("vid_")) continue;

    try {
      const data = JSON.parse(localStorage.getItem(key));
      if (!data || !data.time || !data.duration) continue;

      const id = key.replace("vid_", "");

      const percent = data.time / data.duration;

      // 🔥 harte Validierung
      if (!isFinite(percent)) continue;
      if (percent < 0.1) continue;
      if (percent >= 0.98) continue;
      if (data.time < 10) continue;

      items.push({
        id,
        ...data
      });

    } catch (e) {
      console.warn("Bad entry:", key);
    }
  }

  return items.sort((a, b) => (b.ts || 0) - (a.ts || 0));
}

  
/* renderContinueWatching */
function renderContinueWatching() {

  const box = document.getElementById("continue-videos");
  const row = document.getElementById("continue-row");
  const title = document.getElementById("continue-title");

  if (!box || !row || !title) return;

  box.innerHTML = "";

  const items = getAllProgressEntries();

  if (!items.length) {
    row.style.display = "none";
    title.style.display = "none";
    return;
  }
  
  row.style.display = "block";
  title.style.display = "block";

  items.forEach(entry => {

    const div = document.createElement("div");
    div.className = "video" + (entry.isShort ? " short" : "");
    div.setAttribute("data-id", entry.id);

    const percent = (entry.time / entry.duration) * 100;

    div.innerHTML = `
      <img src="https://img.youtube.com/vi/${entry.id}/hqdefault.jpg">
      <span>${entry.title || "Weiter schauen"}</span>
      <div class="mini-progress" style="width:${percent}%"></div>
    `;

    div.onclick = () => openPlayer(entry.id);

    box.appendChild(div);
    
    setTimeout(() => {
      attachHoverPopup(div, entry.id);
    }, 0);
  });
}

/* renderNewVideos */
function renderNewVideos() {
  const heroBox = document.getElementById("hero-banner");
  const box = document.getElementById("new-videos");
  const row = document.getElementById("new-videos-row");
  
  if (!box || !row || !heroBox) return;
  
  box.innerHTML = "";
  heroBox.innerHTML = "";
  
  if (!allNewVideos.length) {
    row.style.display = "none";
    return;
  }
  
  row.style.display = "block";
  
  // Hero Banner - erstes Video
  const heroItem = allNewVideos[0];
  const heroId = getVideoId(heroItem.link);
  if (heroId) {
    heroBox.innerHTML = `
      <img src="https://img.youtube.com/vi/${heroId}/maxresdefault.jpg"
          onerror="this.src='https://img.youtube.com/vi/${heroId}/hqdefault.jpg'">

      <div class="hero-info">
        <h1>${heroItem.title}</h1>
      </div>
    `;
    heroBox.onclick = () => openPlayer(heroId);
  }
  
  // Große Kacheln - alle neuen Videos
  allNewVideos.forEach(item => {
    const card = createVideo(item);
    card.classList.add("large");
    box.appendChild(card);
  });
}

/* save Current Progress*/
function saveCurrent() {
  if (!player || !currentVideo || typeof player.getCurrentTime !== "function") return;
  
  const current = player.getCurrentTime?.() || 0;
  const duration = player.getDuration?.() || 0;

  if (!duration || current < 1) return;

  if (current >= duration - 2) {
    localStorage.removeItem("vid_" + currentVideo);
    return;
  }
  
  const title = document.querySelector(`.video[data-id="${currentVideo}"] span`)?.innerText || "";
  const videoElement = document.querySelector(`.video[data-id="${currentVideo}"]`);
  const isShortVideo = videoElement?.classList.contains("short") || false;
  saveProgress(currentVideo, current, duration, title, isShortVideo);
}

/* CLOSE */
function closePlayer() {
  saveCurrent();  
  document.getElementById("overlay").style.display = "none";
  document.getElementById("playerView").style.display = "none";

  if (player) {
    try { player.pauseVideo(); } catch(e) {}
  }

  currentVideo = null;
  clearInterval(progressInterval);
  progressInterval = null;
  renderContinueWatching();
}

let hoverPlayer = null;

function attachHoverPopup(card, videoId) {

  const preview = document.getElementById("hoverPreview");

  card.addEventListener("mouseenter", () => {

    preview.style.display = "block";

    preview.innerHTML = `
      <div id="hover-${videoId}" style="width:100%; height:100%;"></div>
    `;

    hoverPlayer = new YT.Player(`hover-${videoId}`, {
      videoId: videoId,
      playerVars: {
        autoplay: 1,
        mute: 1,
        controls: 0,
        rel: 0,
        modestbranding: 1
      }
    });
  });

  card.addEventListener("mousemove", (e) => {
    const offset = 15;

    preview.style.left = (e.clientX + offset) + "px";
    preview.style.top = (e.clientY + offset) + "px";
  });

  card.addEventListener("mouseleave", () => {

    preview.style.display = "none";
    preview.innerHTML = "";

    if (hoverPlayer) {
      hoverPlayer.destroy();
      hoverPlayer = null;
    }
  });
}

/* EVENTS */
document.getElementById("overlay").addEventListener("pointerdown", closePlayer);
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    saveCurrent();
  }
});

window.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closePlayer();
});

</script>

</body>
</html>
