<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Einsflix</title>

<link rel="icon" href="./pic.jpg">
<script src="https://www.youtube.com/iframe_api"></script>

<style>

:root {
  --bg: #141413;
  --text: #9B978E;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* LOGIN */
#loginView {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 260px;
  margin: 150px auto;
  text-align: center;
}

#loginView input {
  padding: 10px;
  border: none;
  border-radius: 8px;
}

#loginView button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

/* APP */
#appView {
  display: none;
}

.container {
  padding: 20px;
}

.row {
  margin-bottom: 30px;
}

.row h2 {
  margin-bottom: 10px;
}

.row-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.row-scroll::-webkit-scrollbar {
  display: none;
}

/* VIDEO CARD */
.video {
  min-width: 200px;
  background: #2a2926;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}

.video img {
  width: 100%;
}

.video span {
  display: block;
  padding: 6px;
  font-size: 12px;
}

/* 🔴 NETFLIX PROGRESS BAR */
.mini-progress {
  position: absolute;
  top: 0;
  left: 0;
  height: 4px;
  width: 0%;
  background: linear-gradient(90deg, #ff0000, #ff4444);
  z-index: 10;
}

/* PLAYER */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  z-index: 9999;
}

.preview {
  position: fixed;
  display: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 800px;
  height: 450px;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  z-index: 10000;
}

.preview iframe {
  pointer-events: none;
}

#player {
  width: 100%;
  height: 100%;
}

/* TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 15px 20px;
  margin-top: 10px;
}

.logo {
  position: absolute;
  left: 20px;
}

.logo img {
  width: 60px;
  height: 60px;
  object-fit: contain;
}

#welcome {
  text-align: center;
  font-size: 16px;
}

.logout {
  position: absolute;
  right: 20px;
  cursor: pointer;
  background: #333;
  padding: 6px 10px;
  border-radius: 6px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginView">
  <h2>Einsflix Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Passwort">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appView">

  <div class="topbar">
    <div class="logo" onclick="location.reload()">
      <img src="./pic.jpg">
    </div>

    <div id="welcome"></div>

    <div class="logout" onclick="logout()">Logout</div>
  </div>

  <div class="container">

    <div class="row">
      <h2>Eintracht Spandau</h2>
      <div class="row-scroll" id="spandau-videos"></div>
    </div>

    <div class="row">
      <h2>LoL</h2>
      <div class="row-scroll" id="lol-videos"></div>
    </div>

    <div class="row">
      <h2>Fußball</h2>
      <div class="row-scroll" id="fussball-videos"></div>
    </div>

    <div class="row">
      <h2>Mediathek</h2>
      <div class="row-scroll" id="media-videos"></div>
    </div>

  </div>
</div>

<!-- PLAYER -->
<div id="overlay"></div>

<div class="preview" id="playerView">
  <div id="player"></div>
</div>

<script>

/* ================= LOGIN ================= */

const PASSWORD = "EinsAufDieEins";

function login() {

  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value.trim();

  if (pass !== PASSWORD) {
    alert("Falsches Passwort");
    return;
  }

  localStorage.setItem("user", user);
  localStorage.setItem("loggedIn", "true");

  startApp();
}

function logout() {
  localStorage.clear();
  location.reload();
}

function isLoggedIn() {
  return localStorage.getItem("loggedIn") === "true";
}

/* ================= APP START ================= */

function startApp() {

  document.getElementById("loginView").style.display = "none";
  document.getElementById("appView").style.display = "block";

  document.getElementById("welcome").innerText =
    "Willkommen " + localStorage.getItem("user");

  loadAll();
}

window.onload = () => {
  if (isLoggedIn()) startApp();
};

/* ================= PLAYER ================= */

let player;
let currentVideo = null;
let progressInterval = null;

/* VIDEO ID */
function getVideoId(url) {
  if (!url) return null;

  if (url.includes("shorts/")) {
    return url.split("shorts/")[1].split("?")[0];
  }

  if (url.includes("youtu.be/")) {
    return url.split("youtu.be/")[1].split("?")[0];
  }

  if (url.includes("v=")) {
    return url.split("v=")[1].split("&")[0];
  }

  return null;
}

/* CARD */
function createVideo(item) {

  const id = getVideoId(item.link);
  if (!id) return document.createElement("div");

  const div = document.createElement("div");
  div.className = "video";

  /* 🔥 WICHTIG: FIX FÜR PROGRESS BAR */
  div.setAttribute("data-id", id);

  div.innerHTML = `
    <img src="https://img.youtube.com/vi/${id}/mqdefault.jpg">
    <span>${item.title}</span>
    <div class="mini-progress"></div>
  `;

  div.onclick = () => openPlayer(id);

  return div;
}

/* LOAD */
async function loadColumn(channelId, containerId) {

  const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;

  const res = await fetch(
    "https://api.rss2json.com/v1/api.json?rss_url=" +
    encodeURIComponent(url)
  );

  const data = await res.json();

  const box = document.getElementById(containerId);
  box.innerHTML = "";

  data.items?.forEach(v => box.appendChild(createVideo(v)));
}

function loadAll() {
  loadColumn("UC5QM2OXKyZaNw13iLbuEpCg", "spandau-videos");
  loadColumn("UCeM9ckIXeJFvdt4bKpXvTqw", "lol-videos");
  loadColumn("UCMQkXTIDVvVDh0ZuVB_0APg", "fussball-videos");
  loadColumn("UCeuKtCc2Q0ySUxYX8yRZhcg", "media-videos");
}

/* OPEN PLAYER */
function openPlayer(id) {

  currentVideo = id;

  document.getElementById("overlay").style.display = "block";
  document.getElementById("playerView").style.display = "block";

  if (!player) {

    player = new YT.Player("player", {
      videoId: id,
      playerVars: { autoplay: 1 },
      events: {
        onReady: () => startProgress()
      }
    });

  } else {
    player.loadVideoById(id);
  }

  startProgress();
}

/* PROGRESS BAR */
function startProgress() {

  clearInterval(progressInterval);

  progressInterval = setInterval(() => {

    if (!player || !currentVideo) return;

    let current = 0;
    let duration = 0;

    try {
      current = player.getCurrentTime() || 0;
      duration = player.getDuration() || 0;
    } catch (e) {
      return;
    }

    if (!duration) return;

    const percent = (current / duration) * 100;

    /* 🔥 SAFE SELECTOR FIX */
    const videoCard = document.querySelector(`.video[data-id="${currentVideo}"]`);
    const bar = videoCard ? videoCard.querySelector(".mini-progress") : null;

    if (bar) bar.style.width = percent + "%";

  }, 250);
}

/* CLOSE PLAYER */
function closePlayer() {

  document.getElementById("overlay").style.display = "none";
  document.getElementById("playerView").style.display = "none";

  if (player) {
    try {
      player.stopVideo();
    } catch (e) {}
  }

  currentVideo = null;

  clearInterval(progressInterval);
  progressInterval = null;

  document.querySelectorAll(".mini-progress").forEach(b => {
    b.style.width = "0%";
  });
}

/* EVENTS */
document.getElementById("overlay").addEventListener("mousedown", closePlayer);

window.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closePlayer();
});

</script>

</body>
</html>
