<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>YouTube Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    /* 📊 3 Spalten Layout */
    .container {
      display: flex;
      gap: 12px;
      padding: 12px;
    }

    .column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .channel-title {
      text-align: center;
      font-size: 18px;
      padding: 8px;
      background: #1b1b1b;
      border-radius: 10px;
    }

    /* 📦 KACHELN */
    .card {
      background: #1b1b1b;
      border-radius: 12px;
      padding: 10px;
      height: 45vh;
      overflow-y: auto;

      /* 🔥 Scroll Snap */
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }

    .card h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #aaa;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
    }

    /* 🎬 Video-Karte */
    .video {
      display: flex;
      gap: 10px;
      background: #222;
      padding: 8px;
      margin: 6px 0;
      border-radius: 10px;
      align-items: center;
      cursor: pointer;

      scroll-snap-align: start;
    }

    .video img {
      width: 120px;
      border-radius: 6px;
    }

    .video a {
      color: white;
      text-decoration: none;
      font-size: 13px;
      flex: 1;
    }

    /* 🔥 Hover Preview */
    .preview {
      position: fixed;
      display: none;
      width: 360px;
      height: 200px;
      border-radius: 10px;
      overflow: hidden;
      z-index: 9999;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    .preview iframe {
      width: 100%;
      height: 100%;
    }

    /* scrollbar styling */
    .card::-webkit-scrollbar {
      width: 6px;
    }

    .card::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- MEDIA -->
  <div class="column">
    <div class="channel-title">Media</div>
  
    <div class="card">
      <h3>🔥 Shorts</h3>
      <div id="media-shorts"></div>
    </div>
  
    <div class="card">
      <h3>🎬 Videos</h3>
      <div id="media-videos"></div>
    </div>
  </div>
  
  <!-- SPANDAU -->
  <div class="column">
    <div class="channel-title">Eintracht Spandau</div>

    <div class="card">
      <h3>🔥 Shorts</h3>
      <div id="spandau-shorts"></div>
    </div>

    <div class="card">
      <h3>🎬 Videos</h3>
      <div id="spandau-videos"></div>
    </div>
  </div>

  <!-- LOL -->
  <div class="column">
    <div class="channel-title">LoL</div>

    <div class="card">
      <h3>🔥 Shorts</h3>
      <div id="lol-shorts"></div>
    </div>

    <div class="card">
      <h3>🎬 Videos</h3>
      <div id="lol-videos"></div>
    </div>
  </div>

  <!-- FUSSBALL -->
  <div class="column">
    <div class="channel-title">Fußball</div>

    <div class="card">
      <h3>🔥 Shorts</h3>
      <div id="fussball-shorts"></div>
    </div>

    <div class="card">
      <h3>🎬 Videos</h3>
      <div id="fussball-videos"></div>
    </div>
  </div>

</div>

<!-- Hover Preview -->
<div class="preview" id="preview"></div>

<script>

const channels = {
  spandau: "UC5QM2OXKyZaNw13iLbuEpCg",
  media: "UCeuKtCc2Q0ySUxYX8yRZhcg",
  lol: "UCeM9ckIXeJFvdt4bKpXvTqw",
  fussball: "UCMQkXTIDVvVDh0ZuVB_0APg"
};

async function getFeed(channelId) {
  const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;

  const res = await fetch(
    "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url)
  );

  const data = await res.json();
  return data.items || [];
}

function isShort(item) {
  return item.link.includes("/shorts/");
}

function getVideoId(url) {
  return url.split("v=")[1]?.split("&")[0] || url.split("/shorts/")[1];
}

function createVideo(item) {
  const id = getVideoId(item.link);
  const thumb = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;

  const div = document.createElement("div");
  div.className = "video";

  div.innerHTML = `
    <img src="${thumb}">
    <a href="${item.link}" target="_blank">${item.title}</a>
  `;

  // 🔥 Hover Preview
  div.addEventListener("mouseenter", () => {
    const preview = document.getElementById("preview");
    preview.style.display = "block";
    preview.innerHTML = `
      <iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1"
        frameborder="0"
        allow="autoplay; encrypted-media">
      </iframe>
    `;
  });

  div.addEventListener("mousemove", (e) => {
    const preview = document.getElementById("preview");
    preview.style.left = (e.pageX + 20) + "px";
    preview.style.top = (e.pageY + 20) + "px";
  });

  div.addEventListener("mouseleave", () => {
    document.getElementById("preview").style.display = "none";
  });

  return div;
}

async function loadColumn(prefix, channelId) {
  const items = await getFeed(channelId);

  const shortsBox = document.getElementById(prefix + "-shorts");
  const videosBox = document.getElementById(prefix + "-videos");

  shortsBox.innerHTML = "";
  videosBox.innerHTML = "";

  items.forEach(item => {
    const el = createVideo(item);

    if (isShort(item)) {
      shortsBox.appendChild(el);
    } else {
      videosBox.appendChild(el);
    }
  });
}

function loadAll() {
  loadColumn("media", channels.media);
  loadColumn("spandau", channels.spandau);
  loadColumn("lol", channels.lol);
  loadColumn("fussball", channels.fussball);
}

// 🚀 Start
loadAll();

// 🔄 Auto Refresh alle 5 Minuten
setInterval(loadAll, 5 * 60 * 1000);

</script>

</body>
</html>
