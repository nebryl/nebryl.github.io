<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Einsflix</title>

<link rel="icon" type="image/jpeg" href="./pic.jpg">
<script src="https://www.youtube.com/iframe_api"></script>

<style>

:root {
  --bg: #232321;
  --text: #9B978E;
  --border: #3a3936;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* 📦 CONTAINER */
.container {
  padding: 20px;
}

/* 🖼️ LOGO */
.logo {
  width: 80px;
  margin-bottom: 20px;
  cursor: pointer;
}
.logo img {
  width: 60px;
}

/* 🎬 ROW */
.row {
  margin-bottom: 30px;
}

.row h2 {
  margin-bottom: 10px;
}

/* 📺 SCROLL */
.row-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}
.row-scroll::-webkit-scrollbar {
  display: none;
}

/* 🎬 VIDEO CARD */
.video {
  min-width: 200px;
  background: #2a2926;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: 0.2s;
}

.video:hover {
  transform: scale(1.06);
}

.video img {
  width: 100%;
}

.hover-preview {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  z-index: 5;
  border-radius: 10px;
  overflow: hidden;
}

.hover-preview iframe {
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.video span {
  padding: 6px;
  display: block;
  font-size: 12px;
}

/* 🔴 MINI PROGRESS */
.mini-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  width: 0%;
  background: red;
}

/* 🌑 OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  z-index: 99998;
}

/* 🎬 PLAYER */
.preview {
  position: fixed;
  display: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 800px;
  height: 450px;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  z-index: 99999;
}

#player {
  width: 100%;
  height: 100%;
}

/* 🎮 TWITCH */
.twitch-btn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #9146FF;
  color: white;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  z-index: 100000;
}

</style>
</head>

<body>

<div class="container">

  <div class="logo" onclick="reloadDashboard()">
    <img src="./pic.jpg">
  </div>

  <div class="row">
    <h2>Eintracht Spandau</h2>
    <div class="row-scroll" id="spandau-videos"></div>
  </div>

  <div class="row">
    <h2>Eintracht Spandau League of Legends</h2>
    <div class="row-scroll" id="lol-videos"></div>
  </div>

  <div class="row">
    <h2>Eintracht Spandau Fußball</h2>
    <div class="row-scroll" id="fussball-videos"></div>
  </div>

  <div class="row">
    <h2>Eintracht Spandau Mediathek</h2>
    <div class="row-scroll" id="media-videos"></div>
  </div>

</div>

<!-- 🌑 OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- 🎬 PLAYER -->
<div class="preview">
  <div id="player"></div>
</div>

<button class="twitch-btn" onclick="openTwitch()">🎮 Twitch</button>

<script>

const channels = {
  spandau: "UC5QM2OXKyZaNw13iLbuEpCg",
  lol: "UCeM9ckIXeJFvdt4bKpXvTqw",
  fussball: "UCMQkXTIDVvVDh0ZuVB_0APg",
  media: "UCeuKtCc2Q0ySUxYX8yRZhcg"
};

let player;
let currentVideo = null;

/* 🔧 VIDEO ID FIX */
function getVideoId(url) {
  if (url.includes("shorts")) {
    return url.split("/shorts/")[1].split("?")[0];
  } else {
    return url.split("v=")[1]?.split("&")[0];
  }
}

/* 💾 STORAGE */
function saveProgress(id, time) {
  localStorage.setItem("vid_" + id, time);
}

function getProgress(id) {
  return localStorage.getItem("vid_" + id) || 0;
}

/* 🎬 PLAYER OPEN */
function openPlayer(id) {
  currentVideo = id;

  document.querySelector(".preview").style.display = "block";
  document.getElementById("overlay").style.display = "block";

  if (player) {
    player.loadVideoById(id);
  } else {
    player = new YT.Player("player", {
      videoId: id,
      events: {
        onReady: () => setInterval(updateProgress, 500)
      }
    });
  }
}

/* 📊 PROGRESS */
function updateProgress() {
  if (!player || !currentVideo) return;

  const current = player.getCurrentTime();
  const duration = player.getDuration();

  saveProgress(currentVideo, current);

  const percent = (current / duration) * 100;

  const bar = document.querySelector(`[data-id="${currentVideo}"] .mini-progress`);
  if (bar) bar.style.width = percent + "%";
}

/* ❌ CLOSE */
document.getElementById("overlay").addEventListener("click", closePlayer);

function closePlayer() {
  document.querySelector(".preview").style.display = "none";
  document.getElementById("overlay").style.display = "none";

  if (player) player.stopVideo();
}

/* 🎬 CREATE */
function createVideo(item) {
  const id = getVideoId(item.link);
  const thumb = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;

  const div = document.createElement("div");
  div.className = "video";
  div.setAttribute("data-id", id);

  div.innerHTML = `
    <img src="${thumb}">
    <div class="hover-preview"></div>
    <span>${item.title}</span>
    <div class="mini-progress"></div>
  `;

  const preview = div.querySelector(".hover-preview");

  let hoverTimer;

  /* 🖱️ HOVER START */
  div.addEventListener("mouseenter", () => {
    hoverTimer = setTimeout(() => {
      preview.style.display = "block";
      preview.innerHTML = `
        <iframe
          src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&loop=1&playlist=${id}"
          frameborder="0"
          allow="autoplay">
        </iframe>
      `;
    }, 400); // Delay für nicer UX
  });

  /* 🖱️ HOVER END */
  div.addEventListener("mouseleave", () => {
    clearTimeout(hoverTimer);
    preview.style.display = "none";
    preview.innerHTML = "";
  });

  /* ▶️ CLICK (dein normales Verhalten bleibt) */
  div.addEventListener("click", () => openPlayer(id));

  return div;
}

/* 📥 LOAD */
async function getFeed(id) {
  const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${id}`;
  const res = await fetch(
    "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url)
  );
  const data = await res.json();
  return data.items;
}

async function loadColumn(key, id) {
  const items = await getFeed(id);
  const box = document.getElementById(key + "-videos");
  box.innerHTML = "";

  items.forEach(v => box.appendChild(createVideo(v)));
}

function loadAll() {
  Object.entries(channels).forEach(([k, v]) => loadColumn(k, v));
}

loadAll();

/* 🎮 TWITCH */
function openTwitch() {
  window.open("https://www.twitch.tv/eintrachtspandau", "_blank");
}

</script>

</body>
</html>
