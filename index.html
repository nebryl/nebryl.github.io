<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Eintracht Spandau Videos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: white;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    .column {
      flex: 1;
      background: #1c1c1c;
      padding: 10px;
      border-radius: 10px;
      overflow-y: auto;
      max-height: 95vh;
    }

    h2 {
      font-size: 18px;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
    }

    .video {
      margin: 10px 0;
    }

    .video a {
      color: #4da3ff;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="column" id="col1">
    <h2>Eintracht Spandau</h2>
  </div>

  <div class="column" id="col2">
    <h2>LoL</h2>
  </div>

  <div class="column" id="col3">
    <h2>Fußball</h2>
  </div>

</div>

<script>
async function loadRSS(url, containerId) {
  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url));
  const data = await res.json();

  const container = document.getElementById(containerId);

  data.items.slice(0, 10).forEach(item => {
    const div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `
      <a href="${item.link}" target="_blank">
        ▶ ${item.title}
      </a>
    `;

    container.appendChild(div);
  });
}

// 🔑 Hier deine Channel RSS Feeds eintragen:
loadRSS("https://www.youtube.com/feeds/videos.xml?channel_id=UCMQkXTIDVvVDh0ZuVB_0APg", "col1");
loadRSS("https://www.youtube.com/feeds/videos.xml?channel_id=UCMQkXTIDVvVDh0ZuVB_0APg", "col2");
loadRSS("https://www.youtube.com/feeds/videos.xml?channel_id=UCMQkXTIDVvVDh0ZuVB_0APg", "col3");
</script>

</body>
</html>
